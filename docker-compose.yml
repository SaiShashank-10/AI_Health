# ═══════════════════════════════════════════════════════════
#  AI Integrative Multilingual Telehealth Orchestrator
#  Docker Compose — Single-Service Deployment
# ═══════════════════════════════════════════════════════════

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telehealth-orchestrator
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=info
      - LLM_PROVIDER=rule_simulation
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
